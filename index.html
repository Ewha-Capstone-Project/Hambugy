<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hambugy</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.6.1/github-markdown.min.css"/>
  <style>
    body { max-width: 860px; margin: 40px auto; padding: 0 20px; }
  </style>
</head>
<body class="markdown-body">
  <div id="content">Loading...</div>
  <script>
    fetch('https://raw.githubusercontent.com/Ewha-Capstone-Project/Hambugy/pages/README.md')
      .then(res => res.text())
      .then(text => {
        document.getElementById('content').innerHTML = marked.parse(text);
      });
  </script>
</body>
</html>
